<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Hatchet Survival Challenge</title>
<style>
body{font-family:Arial,sans-serif;max-width:850px;margin:30px auto;padding:0 18px;line-height:1.5;background:#f7f7f7}
.card{background:white;border:1px solid #bbb;border-radius:10px;padding:22px;margin:16px 0}
button{padding:10px 14px;margin:5px;border-radius:6px;border:1px solid #444;cursor:pointer}
.correct{background:#dff3df}.incorrect{background:#f7dddd}.hidden{display:none}
h1,h2{color:#222}
</style>
</head>
<body>
<h1>Hatchet Survival Challenge</h1>
<p><strong>Mission:</strong> You are alone near a Canadian lake. Choose the best response to each situation. Your choices will introduce the survival problems Brian faces in <em>Hatchet</em>.</p>
<div id="quiz"></div>
<div class="card"><h2 id="score"></h2><p id="message"></p></div>
<script>
const questions=[
 {q:"Your plane has crashed. What should you do first?",a:["Run into the forest immediately","Check injuries and secure a safe location","Eat all available food","Build a raft"],c:1,e:"Safety, injuries, and shelter come before exploration."},
 {q:"You have no matches. Which object may help create sparks?",a:["A steel hatchet","A shoelace","A leaf","A plastic bag"],c:0,e:"Metal striking stone can create sparks—a key discovery in the novel."},
 {q:"Which choice best protects a limited food supply?",a:["Eat everything at once","Store food near sleeping space","Ration it and protect it from animals","Leave it uncovered"],c:2,e:"Planning and protecting resources support long-term survival."},
 {q:"A major storm destroys your shelter. What response shows resilience?",a:["Give up","Rebuild using what you learned","Wait without acting","Blame someone else"],c:1,e:"Resilience means adapting and applying lessons from setbacks."},
 {q:"Which project would best show what you learned?",a:["A copied summary","A survival model with text evidence","A list of chapter titles","An unrelated poster"],c:1,e:"The project asks you to create and support ideas with evidence."}
];
let score=0,answered=0;
const qdiv=document.getElementById("quiz");
questions.forEach((item,i)=>{
 const card=document.createElement("div"); card.className="card";
 card.innerHTML=`<h2>${i+1}. ${item.q}</h2>`;
 item.a.forEach((choice,j)=>{
  const b=document.createElement("button"); b.textContent=choice;
  b.onclick=()=>{
   if(card.dataset.done)return;
   card.dataset.done="1"; answered++;
   if(j===item.c){score++;card.classList.add("correct");}
   else card.classList.add("incorrect");
   const p=document.createElement("p");p.innerHTML=`<strong>${j===item.c?"Correct":"Think again"}:</strong> ${item.e}`;card.appendChild(p);
   if(answered===questions.length){
    document.getElementById("score").textContent=`Score: ${score} / ${questions.length}`;
    document.getElementById("message").textContent="Now predict: What qualities will Brian need to survive?";
   }
  };
  card.appendChild(b);
 });
 qdiv.appendChild(card);
});
</script>
</body>
</html>
